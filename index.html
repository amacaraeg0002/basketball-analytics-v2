<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Touch Economy Analytics Platform</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Firebase Compat SDKs (Provides stable global firebase namespace inside frames) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

    <!-- React and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar to match our premium dark theme */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #090d16;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f97316;
        }
        .court-gradient {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen selection:bg-orange-500/30 selection:text-orange-400">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SAFE LOCALSTORAGE ACCESS WRAPPER (Prevents Sandboxed Security Crashes) ---
        const safeLocalStorage = {
          getItem: (key) => {
            try {
              return localStorage.getItem(key);
            } catch (e) {
              console.warn("Storage access blocked by environment sandbox. Using session memory fallback.", e);
              return null;
            }
          },
          setItem: (key, value) => {
            try {
              localStorage.setItem(key, value);
            } catch (e) {
              console.warn("Write to storage blocked by environment sandbox.", e);
            }
          }
        };

        // --- FIREBASE ENVIRONMENT INTEGRATION (Strict Pathing & Auth Guards) ---
        let auth = null;
        let db = null;
        let firebaseInitialized = false;
        let firebaseConfig = {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'touch-economy-v3';

        try {
          if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
          } else {
            firebaseConfig = {
              apiKey: "mock-fallback-key-for-offline-preview",
              authDomain: "mock-project.firebaseapp.com",
              projectId: "mock-project",
              storageBucket: "mock-project.appspot.com",
              messagingSenderId: "12345",
              appId: "1:12345:web:12345"
            };
          }

          if (firebaseConfig && firebaseConfig.apiKey && typeof firebase !== 'undefined') {
            if (!firebase.apps.length) {
              firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
            firebaseInitialized = true;
          }
        } catch (e) {
          console.error("Firebase connection blocked or failed. Running on offline fail-safe logic.", e);
        }

        // --- REUSABLE PREMIUM SVG ICONS ---
        const ShieldCheck = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const Activity = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-orange-400"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        );
        const TrendingUp = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-sky-400"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        );
        const Users = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-purple-400"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const Database = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-400"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
        );
        const Gamepad = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-pink-400"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/></svg>
        );

        export default function App() {
          // View state: 'setup', 'dashboard', or 'review'
          const [view, setView] = useState(() => {
            const savedView = safeLocalStorage.getItem('te_view');
            return savedView || 'setup';
          });
          const [user, setUser] = useState(null);
          
          // Custom Alert/Toast notifications
          const [toast, setToast] = useState({ visible: false, message: "", type: "info" });
          const showToast = (message, type = "info") => {
            setToast({ visible: true, message, type });
            setTimeout(() => setToast({ visible: false, message: "", type: "info" }), 4000);
          };

          // Auth / Portal inputs
          const [authMode, setAuthMode] = useState('login'); // 'login' or 'signup'
          const [loginType, setLoginType] = useState('username'); // 'username' or 'email'
          const [usernameInput, setUsernameInput] = useState('');
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [authLoading, setAuthLoading] = useState(false);

          // Setup inputs & presets
          const [gameTitle, setGameTitle] = useState('');
          const [system, setSystem] = useState('motion');
          
          // Full customizable roster (initial state is empty to prevent generic placeholder assumptions)
          const [fullRoster, setFullRoster] = useState([
            { id: 1, number: '', name: '', role: 'PG', active: true },
            { id: 2, number: '', name: '', role: 'SG', active: true },
            { id: 3, number: '', name: '', role: 'SF', active: true },
            { id: 4, number: '', name: '', role: 'PF', active: true },
            { id: 5, number: '', name: '', role: 'C', active: true }
          ]);

          // New player modal inputs
          const [tempName, setTempName] = useState('');
          const [tempNumber, setTempNumber] = useState('');
          const [tempRole, setTempRole] = useState('G');

          // Cloud Vault Collections
          const [savedRosters, setSavedRosters] = useState([]);
          const [savedGames, setSavedGames] = useState([]);
          const [selectedArchivedGame, setSelectedArchivedGame] = useState(null);

          // Active Tracking State
          const [currentPossessionTime, setCurrentPossessionTime] = useState(0);
          const [isTimerRunning, setIsTimerRunning] = useState(false);
          const [activePlayer, setActivePlayer] = useState(null);
          const [currentSequence, setCurrentSequence] = useState([]);
          const [selectedLocation, setSelectedLocation] = useState('LAYUP');

          // Strictly initialized state to start entirely at 0/0 and ONLY update upon verified sequence completion
          const [gameStats, setGameStats] = useState({
            totalPossessions: 0,
            avgSecondsPerTouch: 0,
            totalTouchesAcrossGame: 0,
            layupMakes: 0, layupTotal: 0,
            middyMakes: 0, middyTotal: 0,
            threeMakes: 0, threeTotal: 0,
            flowZoneMakes: 0, flowZoneTotal: 0,
            execZoneMakes: 0, execZoneTotal: 0,
            panicZoneMakes: 0, panicZoneTotal: 0,
            turnovers: 0,
            liveTacticalNotes: [],
            playerTotalTouches: {}
          });

          // --- CORE AUTH INITS (Conforming to Rule 3 & Handling offline fallback) ---
          useEffect(() => {
            if (!firebaseInitialized) {
              // Gracefully map a local mock user to preserve complete platform operations
              setUser({ uid: 'local-coach', isAnonymous: true, email: 'local@toucheconomy.app' });
              return;
            }

            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  if (!auth.currentUser) {
                    await auth.signInAnonymously();
                  }
                }
              } catch (err) {
                console.error("Firebase auth initialization failed", err);
                setUser({ uid: 'local-coach', isAnonymous: true, email: 'local@toucheconomy.app' });
              }
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged((u) => {
              if (u) {
                setUser(u);
                fetchRosterVault(u.uid);
                fetchGameArchives(u.uid);
              } else {
                setUser({ uid: 'local-coach', isAnonymous: true, email: 'local@toucheconomy.app' });
              }
            }, (err) => {
              console.warn("Auth listener warning:", err);
              setUser({ uid: 'local-coach', isAnonymous: true, email: 'local@toucheconomy.app' });
            });
            return () => unsubscribe();
          }, []);

          // --- FIRESTORE PERSISTENCE DATA FLOWS (Rule 1 & Rule 2 compliant) ---
          const fetchRosterVault = async (uid) => {
            if (!uid || !firebaseInitialized || !db) return;
            try {
              // Rule 1 Private Path + Rule 2 Plain Query
              const snap = await db.collection('artifacts').doc(appId)
                .collection('users').doc(uid).collection('rosters').get();
              const list = [];
              snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
              setSavedRosters(list);
            } catch (err) {
              console.error("Failed fetching rosters", err);
            }
          };

          const fetchGameArchives = async (uid) => {
            if (!uid || !firebaseInitialized || !db) return;
            try {
              // Rule 1 Private Path + Rule 2 Plain Query
              const snap = await db.collection('artifacts').doc(appId)
                .collection('users').doc(uid).collection('games').get();
              const list = [];
              snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
              // Sort by date manually in memory to avoid index requirements (Rule 2)
              list.sort((a, b) => b.timestamp - a.timestamp);
              setSavedGames(list);
            } catch (err) {
              console.error("Failed fetching archived games", err);
            }
          };

          const handleSaveRosterToVault = async () => {
            if (!user) return;
            if (!firebaseInitialized || !db) {
              showToast("Cloud connection unavailable. Realtime account sync is needed.", "error");
              return;
            }
            const name = prompt("Enter a name for this Roster Preset (e.g., 'Varsity Starters'):");
            if (!name) return;

            try {
              const payload = {
                title: name,
                roster: fullRoster,
                timestamp: Date.now()
              };
              await db.collection('artifacts').doc(appId)
                .collection('users').doc(user.uid).collection('rosters').add(payload);
              showToast("Roster preset saved successfully to Vault!", "success");
              fetchRosterVault(user.uid);
            } catch (err) {
              showToast("Failed to save roster to cloud.", "error");
            }
          };

          const handleLoadRoster = (preset) => {
            setFullRoster(preset.roster);
            showToast(`Loaded roster preset: "${preset.title}"`, "success");
          };

          const handleDeleteRoster = async (id, e) => {
            e.stopPropagation();
            if (!user || !firebaseInitialized || !db) return;
            if (!confirm("Delete this roster preset?")) return;
            try {
              await db.collection('artifacts').doc(appId)
                .collection('users').doc(user.uid).collection('rosters').doc(id).delete();
              showToast("Preset removed.", "info");
              fetchRosterVault(user.uid);
            } catch (err) {
              showToast("Error removing preset.", "error");
            }
          };

          const handleSaveAndExitGame = async () => {
            if (gameStats.totalPossessions === 0) {
              // Simply exit back to setup menu if no plays were tracked
              setView('setup');
              return;
            }

            if (!user || !firebaseInitialized || !db) {
              showToast("Local sessions cannot be archived on server databases.", "info");
              setView('setup');
              return;
            }

            try {
              const payload = {
                title: gameTitle || "Untethered Scrimmage",
                system: system,
                stats: gameStats,
                roster: fullRoster,
                timestamp: Date.now()
              };
              // Save to Firestore private directory path
              await db.collection('artifacts').doc(appId)
                .collection('users').doc(user.uid).collection('games').add(payload);
              
              showToast("Session synced and archived successfully!", "success");
              
              // Reset tracker metrics for clean reload
              setGameStats({
                totalPossessions: 0,
                avgSecondsPerTouch: 0,
                totalTouchesAcrossGame: 0,
                layupMakes: 0, layupTotal: 0,
                middyMakes: 0, middyTotal: 0,
                threeMakes: 0, threeTotal: 0,
                flowZoneMakes: 0, flowZoneTotal: 0,
                execZoneMakes: 0, execZoneTotal: 0,
                panicZoneMakes: 0, panicZoneTotal: 0,
                turnovers: 0,
                liveTacticalNotes: [],
                playerTotalTouches: {}
              });
              
              fetchGameArchives(user.uid);
              setView('setup');
            } catch (err) {
              showToast("Failed to save active session data.", "error");
            }
          };

          // --- CUSTOM ACCOUNT MANAGEMENT (Username / Email support) ---
          const handleAuthSubmit = async (e) => {
            e.preventDefault();
            if (!firebaseInitialized || !auth) {
              showToast("Local environment context blocked database sync.", "error");
              return;
            }
            setAuthLoading(true);
            
            // Format username entries as localized mock email addresses to support standard Firebase Email Auth flow
            const processedEmail = loginType === 'username' 
              ? `${usernameInput.trim().toLowerCase()}@toucheconomy.app` 
              : emailInput.trim();

            try {
              if (authMode === 'signup') {
                await auth.createUserWithEmailAndPassword(processedEmail, passwordInput);
                showToast("Account created successfully!", "success");
              } else {
                await auth.signInWithEmailAndPassword(processedEmail, passwordInput);
                showToast("Successfully logged in!", "success");
              }
              // Reset input metrics
              setUsernameInput('');
              setEmailInput('');
              setPasswordInput('');
            } catch (err) {
              showToast(err.message, "error");
            } finally {
              setAuthLoading(false);
            }
          };

          const handleSignOut = async () => {
            if (!firebaseInitialized || !auth) return;
            try {
              await auth.signOut();
              await auth.signInAnonymously();
              showToast("Signed out. Operating on local memory.", "info");
            } catch (err) {
              console.error("Sign out fail", err);
            }
          };

          // --- CORE ANALYTICAL HANDLERS ---
          const handleAddPlayerToPool = () => {
            if (!tempName.trim() || !tempNumber.trim()) {
              showToast("Enter both player name and jersey number.", "error");
              return;
            }
            const isDuplicate = fullRoster.some(p => p.number === tempNumber);
            if (isDuplicate) {
              showToast(`Jersey #${tempNumber} is already taken on this roster.`, "error");
              return;
            }
            const newPlayer = {
              id: Date.now(),
              number: tempNumber.trim(),
              name: tempName.trim(),
              role: tempRole,
              active: false
            };
            setFullRoster(prev => [...prev, newPlayer]);
            setTempName('');
            setTempNumber('');
            showToast(`Added #${tempNumber} ${tempName} to the bench pool.`, "success");
          };

          const handleLiveSubstitution = (idToToggle) => {
            const player = fullRoster.find(p => p.id === idToToggle);
            if (!player) return;

            if (!player.active) {
              const currentActiveCount = fullRoster.filter(p => p.active).length;
              if (currentActiveCount >= 5) {
                showToast("Only 5 active players allowed on the court at once!", "error");
                return;
              }
            }

            setFullRoster(prev => prev.map(p => {
              if (p.id === idToToggle) {
                return { ...p, active: !p.active };
              }
              return p;
            }));

            // Safely dismount target as active controller if subbed mid-possession
            if (player.id === activePlayer) {
              setActivePlayer(null);
            }
          };

          const activeOnCourtPlayers = fullRoster.filter(p => p.active);

          // Standardized coordinates for visual mapping representation
          const courtCoordinates = [
            { x: '50%', y: '80%' }, // Position 1 (Top / Guard)
            { x: '24%', y: '56%' }, // Position 2 (Left Wing)
            { x: '76%', y: '56%' }, // Position 3 (Right Wing)
            { x: '36%', y: '32%' }, // Position 4 (Left Block)
            { x: '50%', y: '16%' }  // Position 5 (Paint Center)
          ];

          const handlePossessionAction = (player) => {
            if (!isTimerRunning) {
              setIsTimerRunning(true);
            }
            setActivePlayer(player.id);
            setCurrentSequence(prev => [...prev, {
              role: player.role,
              name: player.name,
              playerId: player.id,
              timeStamp: currentPossessionTime
            }]);
          };

          // Update game stats strictly on complete
          const handleEndPossession = (outcome) => {
            setIsTimerRunning(false);
            if (currentSequence.length === 0) return;

            const finalTime = currentPossessionTime;
            const lastTouch = currentSequence[currentSequence.length - 1];

            // Generate contextual feedback notes
            const completeNote = `Possession #${gameStats.totalPossessions + 1}: ${currentSequence.length} touch sequence over ${finalTime}s ended in a ${outcome.toLowerCase()} (${selectedLocation}) by ${lastTouch.name || "unnamed"}.`;

            setGameStats(prev => {
              const updated = { ...prev };
              updated.totalPossessions += 1;
              updated.totalTouchesAcrossGame += currentSequence.length;

              // Accumulate player-specific touch volume in deep memory
              currentSequence.forEach(touch => {
                const prevCount = updated.playerTotalTouches[touch.playerId] || 0;
                updated.playerTotalTouches[touch.playerId] = prevCount + 1;
              });

              // Increment Shot Matrix Outcomes
              if (outcome === 'MAKE') {
                if (selectedLocation === 'LAYUP') { updated.layupMakes += 1; updated.layupTotal += 1; }
                if (selectedLocation === 'MIDDY') { updated.middyMakes += 1; updated.middyTotal += 1; }
                if (selectedLocation === '3PT') { updated.threeMakes += 1; updated.threeTotal += 1; }
              } else if (outcome === 'MISS') {
                if (selectedLocation === 'LAYUP') updated.layupTotal += 1;
                if (selectedLocation === 'MIDDY') updated.middyTotal += 1;
                if (selectedLocation === '3PT') updated.threeTotal += 1;
              } else if (outcome === 'TURNOVER') {
                updated.turnovers += 1;
              }

              // Evaluate Possession Timeline Bracket Metrics
              if (finalTime <= 6) {
                updated.flowZoneTotal += 1;
                if (outcome === 'MAKE') updated.flowZoneMakes += 1;
              } else if (finalTime <= 14) {
                updated.execZoneTotal += 1;
                if (outcome === 'MAKE') updated.execZoneMakes += 1;
              } else {
                updated.panicZoneTotal += 1;
                if (outcome === 'MAKE') updated.panicZoneMakes += 1;
              }

              // Adjust ball movement aggregates
              updated.avgSecondsPerTouch = updated.totalPossessions > 0 
                ? (updated.totalTouchesAcrossGame / updated.totalPossessions).toFixed(1) 
                : 0;

              // Append tactical notes directly
              updated.liveTacticalNotes = [completeNote, ...prev.liveTacticalNotes];

              return updated;
            });

            // Clean active track session variables
            setCurrentPossessionTime(0);
            setActivePlayer(null);
            setCurrentSequence([]);
          };

          // Safe math helper
          const calcPct = (makes, total) => (total > 0 ? ((makes / total) * 100).toFixed(1) : "0.0");

          // Calculate normalized player inclusivity factor (touches / total possessions * 5)
          const getTouchesPerFivePossessions = (stats, playerId) => {
            if (stats.totalPossessions === 0) return "0.0";
            const touches = stats.playerTotalTouches[playerId] || 0;
            return ((touches / stats.totalPossessions) * 5).toFixed(1);
          };

          const handleOpenReview = (game) => {
            setSelectedArchivedGame(game);
            setView('review');
          };

          const handleDeleteArchivedGame = async (id, e) => {
            e.stopPropagation();
            if (!user || !firebaseInitialized || !db) return;
            if (!confirm("Delete this archived game session forever?")) return;
            try {
              await db.collection('artifacts').doc(appId)
                .collection('users').doc(user.uid).collection('games').doc(id).delete();
              showToast("Archived session deleted.", "info");
              fetchGameArchives(user.uid);
            } catch (err) {
              showToast("Error deleting archived record.", "error");
            }
          };

          return (
            <div className="min-h-screen bg-[#070b13] text-slate-100 flex flex-col justify-between">
              
              {/* Dynamic Notification Toast */}
              {toast.visible && (
                <div className={`fixed top-4 right-4 z-50 px-5 py-3.5 rounded-2xl shadow-2xl border flex items-center gap-3 transition-all duration-300 animate-bounce ${
                  toast.type === 'success' ? 'bg-emerald-950/90 border-emerald-500/40 text-emerald-400' :
                  toast.type === 'error' ? 'bg-rose-950/90 border-rose-500/40 text-rose-400' :
                  'bg-slate-900/90 border-slate-800 text-slate-300'
                }`}>
                  <span className="text-lg">
                    {toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : 'ℹ'}
                  </span>
                  <span className="text-xs font-bold font-sans tracking-wide">{toast.message}</span>
                </div>
              )}

              {/* Top Global Navigation Bar */}
              <header className="border-b border-slate-900 bg-[#090d16]/70 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3.5">
                  <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center font-black text-slate-950 shadow-lg shadow-orange-500/10">
                    TE
                  </div>
                  <div>
                    <h1 className="text-xl font-black bg-gradient-to-r from-orange-500 via-amber-400 to-yellow-300 bg-clip-text text-transparent">THE TOUCH ECONOMY</h1>
                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Professional Basketball Telemetry Board</p>
                  </div>
                </div>

                {/* Cloud Database Authenticated Space Indicator */}
                <div className="flex items-center gap-4">
                  {user && !user.isAnonymous ? (
                    <div className="flex items-center gap-3 bg-slate-900/80 border border-slate-800 px-4 py-2 rounded-2xl">
                      <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></div>
                      <span className="text-xs font-bold text-slate-200">
                        {user.email.endsWith('@toucheconomy.app') ? user.email.split('@')[0] : user.email}
                      </span>
                      <button onClick={handleSignOut} className="text-[10px] font-black uppercase text-rose-400 hover:text-rose-300 transition-colors ml-2">
                        Sign Out
                      </button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-2xl">
                      <div className="w-2.5 h-2.5 rounded-full bg-amber-500"></div>
                      <span className="text-xs font-bold text-amber-500">Anonymous Safe Workspace</span>
                    </div>
                  )}
                </div>
              </header>

              {/* --- VIEW 1: PREMIUM MENU, CONFIG & VAULT PANEL --- */}
              {view === 'setup' && (

                        <h3 className="text-xs text-slate-400 font-black tracking-wider uppercase mb-3 flex items-center gap-1.5">
                          <Users /> Shot Location Analytics
                        </h3>
                        <div className="space-y-3">
                          <div>
                            <div className="flex justify-between font-mono text-[10px] mb-0.5">
                              <span className="text-purple-400 font-bold">Layups / Paint Looks</span>
                              <span>{gameStats.layupMakes}/{gameStats.layupTotal} ({calcPct(gameStats.layupMakes, gameStats.layupTotal)}%)</span>
                            </div>
                            <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden"><div className="bg-purple-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(gameStats.layupMakes, gameStats.layupTotal)}%` }}></div></div>
                          </div>
                          <div>
                            <div className="flex justify-between font-mono text-[10px] mb-0.5">
                              <span className="text-amber-400 font-bold">Mid-Range Jumpshots</span>
                              <span>{gameStats.middyMakes}/{gameStats.middyTotal} ({calcPct(gameStats.middyMakes, gameStats.middyTotal)}%)</span>
                            </div>
                            <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden"><div className="bg-amber-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(gameStats.middyMakes, gameStats.middyTotal)}%` }}></div></div>
                          </div>
                          <div>
                            <div className="flex justify-between font-mono text-[10px] mb-0.5">
                              <span className="text-indigo-400 font-bold">Perimeter 3-Pointers</span>
                              <span>{gameStats.threeMakes}/{gameStats.threeTotal} ({calcPct(gameStats.threeMakes, gameStats.threeTotal)}%)</span>
                            </div>
                            <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden"><div className="bg-indigo-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(gameStats.threeMakes, gameStats.threeTotal)}%` }}></div></div>
                          </div>
                        </div>
                      </div>

                    </div>

                    {/* Substitution & Rotation Suite Panel */}
                    <div className="bg-slate-900/30 border border-slate-900 rounded-2xl p-5">
                      <h3 className="text-xs font-black text-slate-300 uppercase tracking-wider mb-2.5 flex items-center gap-2">
                        🔄 Live Substitution Control Panel
                      </h3>
                      <div className="flex flex-wrap gap-2 max-h-[110px] overflow-y-auto">
                        {fullRoster.map((player) => (
                          <button
                            key={player.id}
                            onClick={() => handleLiveSubstitution(player.id)}
                            className={`px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 border transition-all ${
                              player.active 
                                ? 'bg-orange-500/10 text-orange-400' 
                                : 'bg-slate-950 border-slate-900 text-slate-500 hover:text-slate-400 hover:border-slate-800'
                            }`}
                          >
                            <span className="font-mono text-[10px]">#{player.number || "?"}</span>
                            <span className="truncate max-w-[80px]">{player.name || "Unnamed"}</span>
                            <span className="text-[8px] uppercase tracking-wider opacity-60">({player.active ? 'On Floor' : 'Bench'})</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Sequential Feedback logs list (Only logs completed runs) */}
                    <div className="bg-slate-900/30 border border-slate-900 rounded-2xl p-5">
                      <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-2.5 flex items-center gap-2">
                        📋 Completed Play Sequence History Logs
                      </h3>
                      <div className="bg-slate-950 border border-slate-900 rounded-xl p-3.5 max-h-[105px] overflow-y-auto space-y-2 font-mono text-[11px] text-slate-400">
                        {gameStats.liveTacticalNotes.length === 0 ? (
                          <div className="text-slate-600 italic">No runs committed yet. Set outcomes and complete plays to record sequence history.</div>
                        ) : (
                          gameStats.liveTacticalNotes.map((note, idx) => (
                            <div key={idx} className="border-l-2 border-orange-500 pl-2 py-0.5 bg-slate-900/40 rounded-r">
                              {note}
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                    {/* Touches per 5 possessions index card */}
                    <div className="bg-slate-900 border border-slate-900 rounded-3xl p-6 shadow-xl relative flex-1 flex flex-col justify-between">
                      <div>
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3">
                          <h3 className="text-base font-black text-slate-200 flex items-center gap-2 uppercase tracking-wide">
                            <Gamepad /> Touches Per 5 Possessions
                          </h3>
                          <div className="text-[10px] font-mono text-slate-400">Possession Count: {gameStats.totalPossessions}</div>
                        </div>
                        <p className="text-xs text-slate-400 mb-4 leading-normal">
                          Tracks individual player volume across standardized 5-possession game segments. Quickly exposes unselfish play-makers versus stagnant baselines.
                        </p>

                        <div className="bg-slate-950 border border-slate-900 rounded-2xl p-4 divide-y divide-slate-900">
                          {activeOnCourtPlayers.map((player) => {
                            const touchesPerFive = getTouchesPerFivePossessions(gameStats, player.id);
                            const cumulative = gameStats.playerTotalTouches[player.id] || 0;
                            return (
                              <div key={player.id} className="py-2.5 flex items-center justify-between text-xs font-mono">
                                <div className="flex items-center gap-3">
                                  <span className="text-orange-400 font-bold w-6">#{player.number || "?"}</span>
                                  <span className="text-slate-200 font-bold font-sans text-sm">{player.name || "Unnamed"}</span>
                                  <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-500 px-1.5 py-0.5 rounded font-black uppercase">{player.role}</span>
                                </div>
                                <div className="text-right">
                                  <div className="text-slate-100 font-black text-sm">{touchesPerFive} <span className="text-[10px] text-slate-400 font-normal">Touches / 5 Poss</span></div>
                                  <div className="text-[10px] text-slate-600">Total touches: {cumulative}</div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Active session save and egress button */}
                      <div className="mt-5 pt-4 border-t border-slate-900 flex flex-col sm:flex-row gap-4 items-center justify-between">
                        <div className="text-[11px] font-mono text-slate-500">
                          Movement velocity index: {gameStats.avgSecondsPerTouch} Touches/Poss
                        </div>
                        <button 
                          onClick={handleSaveAndExitGame}
                          className="bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-slate-950 font-black px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider transition-all"
                        >
                          Save & Sync Game Archives ➔
                        </button>
                      </div>

                    </div>

                  </div>
                </main>
              )}

              {/* --- VIEW 3: HISTORICAL COMPLETED RECORD GAME VIEW --- */}
              {view === 'review' && selectedArchivedGame && (
                <main className="max-w-5xl mx-auto w-full p-6 bg-[#090d16]/50 border border-slate-900 rounded-3xl my-8 shadow-2xl flex-1 space-y-6">
                  
                  {/* Archived game header metadata details */}
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 border-b border-slate-900 pb-5">
                    <div>
                      <span className="bg-orange-500/10 text-orange-400 font-mono text-[10px] px-3 py-1 rounded-full border border-orange-500/20 font-bold uppercase tracking-widest">Archived Game Summary</span>
                      <h2 className="text-2xl font-black mt-2">{selectedArchivedGame.title}</h2>
                      <p className="text-xs text-slate-400 mt-0.5">Offensive Style Profile: {selectedArchivedGame.system === 'motion' ? 'Motion Scheme' : 'Isolation Set'}</p>
                    </div>
                    <button 
                      onClick={() => setView('setup')}
                      className="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 px-4 py-2 rounded-xl text-xs font-black uppercase transition-all"
                    >
                      ← Close Review Mode
                    </button>
                  </div>

                  {/* Summary split grid graphs */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    {/* Time efficiency ranges */}
                    <div className="bg-slate-950 border border-slate-900 rounded-2xl p-5">
                      <h3 className="text-xs text-slate-400 font-black tracking-wider uppercase mb-3 flex items-center gap-1.5">
                        <TrendingUp /> Time-Zone Efficiency Profiles
                      </h3>
                      <div className="space-y-3">
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-emerald-400 font-bold">Flow Phase (0-6s)</span>
                            <span>{selectedArchivedGame.stats.flowZoneMakes}/{selectedArchivedGame.stats.flowZoneTotal} ({calcPct(selectedArchivedGame.stats.flowZoneMakes, selectedArchivedGame.stats.flowZoneTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-emerald-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.flowZoneMakes, selectedArchivedGame.stats.flowZoneTotal)}%` }}></div></div>
                        </div>
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-sky-400 font-bold">Execution Phase (7-14s)</span>
                            <span>{selectedArchivedGame.stats.execZoneMakes}/{selectedArchivedGame.stats.execZoneTotal} ({calcPct(selectedArchivedGame.stats.execZoneMakes, selectedArchivedGame.stats.execZoneTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-sky-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.execZoneMakes, selectedArchivedGame.stats.execZoneTotal)}%` }}></div></div>
                        </div>
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-rose-500 font-bold">Panic Phase (15s+)</span>
                            <span>{selectedArchivedGame.stats.panicZoneMakes}/{selectedArchivedGame.stats.panicZoneTotal} ({calcPct(selectedArchivedGame.stats.panicZoneMakes, selectedArchivedGame.stats.panicZoneTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-rose-500 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.panicZoneMakes, selectedArchivedGame.stats.panicZoneTotal)}%` }}></div></div>
                        </div>
                      </div>
                    </div>

                    {/* Shot locations summary */}
                    <div className="bg-slate-950 border border-slate-900 rounded-2xl p-5">
                      <h3 className="text-xs text-slate-400 font-black tracking-wider uppercase mb-3 flex items-center gap-1.5">
                        <Users /> Shot Location Analytics
                      </h3>
                      <div className="space-y-3">
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-purple-400 font-bold">Layups / Paint Looks</span>
                            <span>{selectedArchivedGame.stats.layupMakes}/{selectedArchivedGame.stats.layupTotal} ({calcPct(selectedArchivedGame.stats.layupMakes, selectedArchivedGame.stats.layupTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-purple-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.layupMakes, selectedArchivedGame.stats.layupTotal)}%` }}></div></div>
                        </div>
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-amber-400 font-bold">Mid-Range Jumpshots</span>
                            <span>{selectedArchivedGame.stats.middyMakes}/{selectedArchivedGame.stats.middyTotal} ({calcPct(selectedArchivedGame.stats.middyMakes, selectedArchivedGame.stats.middyTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-amber-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.middyMakes, selectedArchivedGame.stats.middyTotal)}%` }}></div></div>
                        </div>
                        <div>
                          <div className="flex justify-between font-mono text-xs mb-0.5">
                            <span className="text-indigo-400 font-bold">Perimeter 3-Pointers</span>
                            <span>{selectedArchivedGame.stats.threeMakes}/{selectedArchivedGame.stats.threeTotal} ({calcPct(selectedArchivedGame.stats.threeMakes, selectedArchivedGame.stats.threeTotal)}%)</span>
                          </div>
                          <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden"><div className="bg-indigo-400 h-2 rounded-full transition-all" style={{ width: `${calcPct(selectedArchivedGame.stats.threeMakes, selectedArchivedGame.stats.threeTotal)}%` }}></div></div>
                        </div>
                      </div>
                    </div>

                  </div>

                  {/* Historic Inclusivity Index list */}
                  <div className="bg-slate-950 border border-slate-900 rounded-2xl p-5">
                    <h3 className="text-xs font-black text-slate-200 mb-3 uppercase tracking-wide">
                      Touches Per 5 Possessions (Inclusivity Volume)
                    </h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {selectedArchivedGame.roster.filter(p => p.active).map((player) => {
                        const touchesPerFive = getTouchesPerFivePossessions(selectedArchivedGame.stats, player.id);
                        const cumulative = selectedArchivedGame.stats.playerTotalTouches[player.id] || 0;
                        return (
                          <div key={player.id} className="bg-[#090d16] border border-slate-900 p-4 rounded-xl flex items-center justify-between text-xs font-mono">
                            <div className="flex items-center gap-2">
                              <span className="text-orange-400 font-bold w-5">#{player.number || "?"}</span>
                              <span className="text-slate-200 font-bold font-sans text-sm">{player.name || "Anon"}</span>
                            </div>
                            <div className="text-right">
                              <div className="text-slate-100 font-black text-sm">{touchesPerFive} <span className="text-[10px] text-slate-400 font-normal">Touches/5Poss</span></div>
                              <div className="text-[10px] text-slate-600">Total: {cumulative}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Historical run logs list */}
                  <div className="bg-slate-950 border border-slate-900 rounded-2xl p-5">
                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-2.5">
                      Session Possession History Logs
                    </h3>
                    <div className="max-h-[160px] overflow-y-auto space-y-2 font-mono text-xs text-slate-400">
                      {selectedArchivedGame.stats.liveTacticalNotes.map((note, idx) => (
                        <div key={idx} className="border-l-2 border-slate-800 pl-2 py-0.5">
                          {note}
                        </div>
                      ))}
                    </div>
                  </div>

                </main>
              )}

              {/* Bottom Brand Footer Accent */}
              <footer className="border-t border-slate-900 bg-[#090d16]/30 px-6 py-4 text-center text-[10px] font-mono text-slate-600">
                &copy; 2026 The Touch Economy Telemetry Board. Powered by Google Cloud.
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
